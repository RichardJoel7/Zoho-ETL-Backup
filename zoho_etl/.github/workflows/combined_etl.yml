name: Combined CRM to BigQuery ETL

on:
  schedule:
    # Runs at 8:00 AM IST everyday 
    - cron: '30 2 * * *'
    # Runs at 02:30 PM IST every day (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Zoho Sync
      env:
        ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
        ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
        ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
        ZOHO_DOMAIN: ${{ secrets.ZOHO_DOMAIN }}
        GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: python zoho_sync.py

    - name: Run HubSpot Sync
      env:
        HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: python hubspot_sync.py